{% extends 'base.html' %}

<!-- Content -->
{% block content %}
<div class="container py-5">
  <h1 class="mb-4">Book an Accounting Consultation</h1>

  <form method="post" class="row g-3">
    {% csrf_token %}

    <!-- Form Errors -->
    {% if form.non_field_errors %}
    <div class="alert alert-danger">{{ form.non_field_errors }}</div>
    {% endif %}

    <!-- Form -->
    {% for field in form %}
    <div class="col-md-6">
      <label class="form-label" for="{{ field.id_for_label }}">
        {{ field.label }}
      </label>

      {{ field }}

      <!-- Form Field Errors -->
      {% if field.errors %}
      <div class="text-danger small">{{ field.errors }}</div>
      {% endif %}
    </div>
    {% endfor %}

    <div class="col-12">
      <button type="submit" class="btn btn-primary">Request Appointment</button>
    </div>
  </form>
</div>

<script>
  const dateInput = document.querySelector("#id_appointment_date");
  const timeSelect = document.querySelector("#id_appointment_time");

  function resetTimeOptions() {
    for (const option of timeSelect.options) {
      option.disabled = false;
      option.textContent = option.textContent.replace(" (Booked)", "");
    }
  }

  dateInput.addEventListener("change", async function () {
    resetTimeOptions();

    if (!dateInput.value) {
      return;
    }

    const response = await fetch(`/booked-times/?date=${dateInput.value}`);
    const data = await response.json();

    for (const option of timeSelect.options) {
      if (data.booked_times.includes(option.value)) {
        option.disabled = true;
        option.textContent = `${option.textContent} (Booked)`;
      }
    }

    if (timeSelect.selectedOptions[0]?.disabled) {
      timeSelect.value = "";
    }
  });
</script>
{% endblock %}
